
<!DOCTYPE html>
<html>
<head>
    <title>Student Attentiveness Checker</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 40px;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        h3 {
            color: blue;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Student Attentiveness Checker</h2>

        <form action="/predict" method="post">
            <input type="number" name="eye_contact" placeholder="Eye Contact (0 or 1)" required><br>
            <input type="number" name="mobile_usage" placeholder="Mobile Usage (0 or 1)" required><br>
            <input type="number" name="note_taking" placeholder="Note Taking (0 or 1)" required><br>
            <input type="number" name="attendance_percentage" placeholder="Attendance %" required><br>
            <input type="number" name="speaking_in_class" placeholder="Speaking in Class (0 or 1)" required><br>
            <input type="number" name="yawn_count" placeholder="Yawn Count" required><br>

            <button type="submit">Check</button>
        </form>

        <h3>{{ prediction_text }}</h3>
    </div>

</body>
</html>
